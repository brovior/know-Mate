<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aegis Desk</title>
<link rel="stylesheet" href="assets/tabler-icons.min.css">
<link rel="stylesheet" href="styles.css">
</head>
<body>

<div class="app">
  <!-- 타이틀바 (커스텀 프레임) -->
  <div class="titlebar" id="titlebar">
    <img class="titlebar-logo" src="assets/logo64.png" alt="Aegis Desk">
    <span class="titlebar-title">Aegis Desk</span>
    <div class="titlebar-right">
      <span class="titlebar-badge">사내망 전용</span>
      <span class="titlebar-user" id="titleUser">사용자</span>
    </div>
    <div class="titlebar-controls">
      <button class="wc-btn wc-min"   onclick="windowMinimize()" title="최소화">&#8722;</button>
      <button class="wc-btn wc-max"   onclick="windowMaximize()" title="최대화" id="wcMax"><span id="wcMaxIcon">&#9633;</span></button>
      <button class="wc-btn wc-close" onclick="windowClose()"    title="닫기">&#10005;</button>
    </div>
  </div>

  <div class="main">
    <!-- 사이드바 -->
    <div class="sidebar">
      <!-- 모드 전환 세그먼트 -->
      <div class="seg-wrap">
        <div class="seg">
          <button class="seg-btn active" id="segKnow" onclick="switchMode('knowledge')">지식검색</button>
          <button class="seg-btn"        id="segMes"  onclick="switchMode('mes')">MES 에이전트</button>
        </div>
      </div>

      <!-- 모드별 패널 -->
      <div id="panelKnow">
        <div class="panel">
          <div class="panel-title">검색 범위</div>
          <label class="check-item selected">
            <input type="checkbox" id="chkLocal" checked> 내 PC 문서
            <span class="badge badge-doc" id="badgeLocal">-</span>
          </label>
          <label class="check-item selected">
            <input type="checkbox" id="chkShared" checked> 공유 폴더
            <span class="badge badge-doc" id="badgeShared">-</span>
          </label>
          <label class="check-item selected">
            <input type="checkbox" id="chkMail" checked> 내 메일함
            <span class="badge badge-doc" id="badgeMail">-</span>
          </label>
        </div>
      </div>
      <div id="panelMes" style="display:none;">
        <div class="mes-panel">
          <i class="ti ti-robot-off"></i>
          <div>MES 에이전트 준비 중</div>
          <div style="font-size:11px;">추후 업데이트 예정</div>
        </div>
      </div>

      <!-- 최근 질문 -->
      <div class="recent" id="recentList">
        <div class="panel-title" style="margin-top:4px;">최근 질문</div>
      </div>

      <!-- 사이드바 하단 -->
      <div class="sidebar-bottom">
        <div class="index-card">
          <div class="index-row">
            <span class="index-label" id="idxIcon">✅ 마지막 인덱싱</span>
            <span class="index-time"  id="idxTime">-</span>
          </div>
          <div class="prog-wrap" id="progWrap" style="display:none;">
            <div class="prog-bar" id="progBar" style="width:0%"></div>
          </div>
          <div class="prog-text" id="progText"></div>
          <div class="prog-file" id="progFile"></div>
          <div class="index-detail" id="idxDetail">-</div>
        </div>

        <div class="btn-row">
          <button class="btn-reindex" id="btnReindex" onclick="startReindex()">
            <i class="ti ti-refresh" style="font-size:14px;"></i> 지금 재인덱싱
          </button>
          <button class="btn-folder" onclick="openOnboarding()">
            <i class="ti ti-folder" style="font-size:14px;"></i> 폴더 관리
          </button>
        </div>

        <button class="btn-new-chat" onclick="newThread()">+ 새 대화</button>
      </div>
    </div>

    <!-- 채팅 영역 -->
    <div class="chat-area">
      <div class="tab-bar" id="tabBar">
        <div class="tab active" id="tabNew" onclick="newThread()">새 대화 +</div>
      </div>

      <div class="chat-scroll" id="chatScroll"></div>

      <div class="input-bar">
        <input class="input-pill" id="inputPill"
          placeholder="질문을 입력하세요..."
          onkeydown="handleKey(event)">
        <button class="btn-send" onclick="sendMsg()">
          <i class="ti ti-arrow-up"></i>
        </button>
      </div>
    </div>
  </div>
</div>

<!-- 온보딩 오버레이 -->
<div class="overlay" id="overlay">
  <div class="onboard-card">
    <div class="ob-title" id="obTitle">Aegis Desk 첫 설정</div>
    <div class="ob-sub"   id="obSub">인덱싱할 폴더를 선택하세요</div>

    <div id="folderList"></div>

    <button class="btn-add-folder" onclick="addFolder()">
      <i class="ti ti-plus" style="font-size:14px;"></i> 폴더 추가
    </button>
    <div class="doc-count" id="obDocCount"></div>

    <div class="ob-prog-wrap" id="obProgWrap">
      <div class="ob-prog-bar" id="obProgBar" style="width:0%"></div>
    </div>
    <div class="ob-prog-text" id="obProgText"></div>
    <div class="ob-prog-file" id="obProgFile"></div>

    <div class="ob-btns">
      <button class="btn-ob-start" id="obStartBtn" onclick="startFullIndex()">
        <i class="ti ti-refresh" style="font-size:14px;"></i> 인덱싱 시작
      </button>
      <button class="btn-ob-cancel" onclick="closeOnboarding()">취소</button>
    </div>
  </div>
</div>

<!-- 토스트 -->
<div class="toast" id="toast"></div>

<script src="app.js"></script>
</body>
</html>
