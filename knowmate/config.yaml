log_level: INFO   # DEBUG | INFO | WARNING | ERROR

extractor: auto
embedding:
  mode: api                # 반드시 api. local은 폐쇄망에서 모델 다운로드 불가로 무한 대기 발생 (CLAUDE.md 환경 절 참조)
  local_model: BAAI/bge-m3
  base_url: http://10.x.x.x   # ← 빌드 전 실제 사내 임베딩 서버 IP로 교체
  host_header: embed.internal
  api_key: ""              # 비워두면 EMBED_API_KEY 환경변수 → 더미값(dummy) 순으로 사용
  # 모델·차원은 rag/embedding.py 의 상수(MODEL_DIMS)로 고정. 변경 시 전체 재인덱싱 필요.
  batch_size: 32
chunking:
  chunk_size: 400
  overlap: 80
  max_file_size_mb: 30        # 1단: 이 크기 초과 파일은 파싱 전에 제외
  xlsx_max_rows_per_sheet: 2000  # 2단: xlsx 시트당 행 수 초과 시 메타 청크 1개로 대체
  max_chunks_per_file: 500    # 3단: 모든 형식 공통 최대 청크 수 (최후 안전망)
search:
  top_k_max: 10
  score_threshold: 0.3
  rerank_enabled: false
collector:
  watch_folders: []        # 배포 기본값은 비움. 앱의 [폴더 관리]에서 사용자별로 지정
  idle_enabled: true       # 유휴 시간 경과 시 자동 인덱싱 여부
  idle_seconds: 60
  drm_idle_threshold_sec: 480  # 이 시간(초) 이상 유휴면 DRM/SSO 세션 만료로 보고
                                # DRM 의심 문서(구형 바이너리·오라벨 OOXML)는 해당
                                # 사이클에서 건너뜀(다음 유효 사이클에 자동 재시도)
cleanup:
  dry_run: true
  max_delete_ratio: 0.3
llm:
  mode: api                # 사내 LLM 서버 직접 호출 (fake|claude|openrouter|api)
  model: qwen3-27b
  api_key: ""              # 비우면 더미값(dummy). 사내 서버가 키 요구 시 채움
  base_url: http://10.x.x.x   # ← 빌드 전 실제 사내 LLM 서버 IP로 교체
  host_header: llm.internal
  max_context_tokens: 4096
mail:
  enabled: true            # watch_folders 내 메일 파일 자동 인덱싱 (false로 끄기)
  extensions:              # 인덱싱할 메일 확장자 (.mysingle=Knox, .eml=표준 이메일)
  - .mysingle
  - .eml
  max_mails_per_scan: 500  # 스캔당 처리 상한 (최신 mtime 순)
  batch_commit_every: 50   # state 중간 저장 주기
ui:
  close_action: tray       # 닫기(X) 버튼 동작: tray(트레이로 숨김) | quit(앱 종료)
