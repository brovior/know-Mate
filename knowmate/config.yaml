extractor: auto
embedding:
  mode: local
  local_model: BAAI/bge-m3
  base_url: http://10.x.x.x
  host_header: embed.internal
  api_key: ""              # 비워두면 EMBED_API_KEY 환경변수 → 더미값(dummy) 순으로 사용
  # 모델·차원은 rag/embedding.py 의 상수(MODEL_DIMS)로 고정. 변경 시 전체 재인덱싱 필요.
  batch_size: 32
chunking:
  chunk_size: 400
  overlap: 80
search:
  top_k_max: 10
  score_threshold: 0.4
  rerank_enabled: false
collector:
  watch_folders:
  - C:/Users/SDSPRO/Documents/공공행정
  idle_seconds: 60
cleanup:
  dry_run: true
  max_delete_ratio: 0.3
llm:
  mode: openrouter
  model: anthropic/claude-haiku-4-5
  api_key: ""              # 비워두면 OPENROUTER_API_KEY / ANTHROPIC_API_KEY 환경변수 사용
  base_url: http://10.x.x.x
  host_header: llm.internal
  max_context_tokens: 4096
